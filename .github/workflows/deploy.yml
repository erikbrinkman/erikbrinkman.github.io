name: deploy

on:
  workflow_dispatch:

jobs:
  gate:
    uses: ./.github/workflows/build.yml

  pages-build:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - uses: actions/configure-pages@v6
        with:
          static_site_generator: next
      - run: bun export
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  # separate from the build so a failed deploy re-runs without rebuilding the site
  pages-deploy:
    needs: pages-build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
